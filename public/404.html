<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RUTILLAS</title>
    <script>
      (function() {
        var path = window.location.pathname;
        var search = window.location.search;
        // Save full path and redirect to root
        sessionStorage.setItem('spa_redirect', path + search);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
