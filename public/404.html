<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect trick
      // Saves the path to sessionStorage then redirects to index.html
      var path = window.location.pathname;
      var base = '/blaker';
      var route = path.replace(base, '') || '/';
      sessionStorage.setItem('spa_redirect', route + window.location.search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
