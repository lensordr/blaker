<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BLAKER</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // When GitHub serves this 404.html, save the intended path
      // and redirect to the root so React Router can handle it
      (function() {
        var base = '/blaker';
        var path = window.location.pathname.replace(base, '') || '/';
        var search = window.location.search;
        sessionStorage.setItem('spa_redirect', path + search);
        window.location.replace(base + '/');
      })();
    </script>
  </head>
  <body></body>
</html>
