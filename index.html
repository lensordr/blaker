    <script>
      // GitHub Pages SPA — restore route on hard refresh
      (function() {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', '/blaker' + redirect);
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
